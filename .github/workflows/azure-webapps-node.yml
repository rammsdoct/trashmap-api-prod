on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: trashmap-api-presamordor   # <-- pon aquí el nombre real de tu App Service
  NODE_VERSION: "20.x"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ✅ NO hacemos npm install aquí si Azure va a construir
      # (Si quieres, lo dejamos solo para tests, pero NO empaquetamos node_modules)

      - name: Run tests (optional)
        run: |
          npm install
          npm run test --if-present

      - name: Create deployment zip (clean)
        run: |
          rm -rf node_modules
          rm -f node_modules.tar.gz
          zip -r app.zip . -x "node_modules/*" ".git/*" ".github/*" "node_modules.tar.gz" "_del_node_modules" "*.log"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: none

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
